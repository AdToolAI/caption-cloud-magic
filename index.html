<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#8B5CF6" />
    
    <!-- Preload Critical Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Basic Meta Tags (Fallback for Crawlers - wird von React-Helmet überschrieben) -->
    <title>CaptionGenie - KI Social Media Caption Generator</title>
    <meta name="description" content="Erstelle perfekte Instagram, Facebook & LinkedIn Captions in Sekunden mit KI. Über 10.000 Creator vertrauen CaptionGenie." />
    <meta name="author" content="CaptionGenie" />
    <meta name="keywords" content="social media, captions, KI, Instagram, Facebook, LinkedIn, Content Creation, AI" />
    
    <!-- PWA / Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    
    <!-- Security Headers (sollten auch vom Server gesetzt werden) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="CaptionGenie - KI Social Media Caption Generator" />
    <meta property="og:description" content="Erstelle perfekte Social Media Captions in Sekunden mit KI" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="de_DE" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CaptionGenie - KI Social Media Caption Generator" />
    <meta name="twitter:description" content="Erstelle perfekte Social Media Captions in Sekunden mit KI" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Google Consent Mode v2 -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      // Default consent state
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'analytics_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'wait_for_update': 500
      });
      
      gtag('js', new Date());
      
      // GA Measurement ID aus Environment Variable (wird beim Build ersetzt)
      const GA_MEASUREMENT_ID = '__GA_MEASUREMENT_ID__';
      if (GA_MEASUREMENT_ID && GA_MEASUREMENT_ID !== '__GA_MEASUREMENT_ID__') {
        gtag('config', GA_MEASUREMENT_ID);
      }
    </script>
    
    <!-- Google Analytics Script (nur nach Consent laden) -->
    <script>
      // GA Script wird nach Consent dynamisch geladen via consent.ts
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
