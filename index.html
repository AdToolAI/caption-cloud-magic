    <meta name="theme-color" content="#8B5CF6" />
    
    <!-- Preload Critical Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" 
      as="style" 
      fetchpriority="high"
      onload="this.onload=null;this.rel='stylesheet'"
    />

      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Basic Meta Tags (Fallback for Crawlers - wird von React-Helmet überschrieben) -->
    <title>AdTool AI - KI Social Media Manager</title>
    <meta name="description" content="Erstelle & analysiere Social Media Content mit KI. Über 10.000 Creator vertrauen AdTool AI." />
    <meta name="author" content="AdTool AI" />
    <meta name="keywords" content="social media, captions, KI, Instagram, Facebook, LinkedIn, Content Creation, AI" />
    
    <!-- Google Search Console Verification (wird nach Setup ersetzt) -->
    <meta name="google-site-verification" content="DEIN_VERIFIKATIONSCODE_HIER" />
    
    <!-- PWA / Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    
    <!-- Security Headers (sollten auch vom Server gesetzt werden) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="AdTool AI - KI Social Media Manager" />
    <meta property="og:description" content="Erstelle & analysiere Social Media Content mit KI" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://useadtool.ai" />
    <meta property="og:image" content="https://useadtool.ai/og-home.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="de_DE" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AdTool AI - KI Social Media Manager" />
    <meta name="twitter:description" content="Erstelle & analysiere Social Media Content mit KI" />
    <meta name="twitter:image" content="https://useadtool.ai/og-home.jpg" />
    
    <!-- Google Consent Mode v2 -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      // Default consent state
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'analytics_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'wait_for_update': 500
      });
      
      gtag('js', new Date());
      
      // GA Measurement ID
      const GA_MEASUREMENT_ID = 'G-VSWEB93JDN';
      if (GA_MEASUREMENT_ID && GA_MEASUREMENT_ID !== '__GA_MEASUREMENT_ID__') {
        gtag('config', GA_MEASUREMENT_ID);
      }
    </script>
    
    <!-- Google Analytics Script (nur nach Consent laden) -->

    </script>
