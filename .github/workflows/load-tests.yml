name: Load Tests

on:
  # Disabled until load tests are repaired (Phase 1 cleanup).
  workflow_dispatch:

jobs:
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      
      - name: Run API load tests
        run: k6 run tests/load/api-stress-test.js
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
      
      - name: Run template analytics load test
        run: k6 run tests/load/template-analytics-load.js
        if: always()
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
      
      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: |
            tests/load/*.json
            tests/load/*.html
          retention-days: 30
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Read load test results and comment on PR
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Load Test Results\n\n✅ Load tests completed successfully!'
            });
