name: E2E Critical Journeys

# Schlanker, stabiler E2E-Workflow.
# Läuft nur die 5 kritischen User-Journeys gegen die Published URL.
# Kein Login, keine Secrets — soll bei jedem Push grün bleiben und
# echte Regressionen sofort melden.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Einmal täglich um 06:00 UTC gegen Production
    - cron: '0 6 * * *'

jobs:
  critical-journeys:
    name: Critical User Journeys
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run critical journeys
        env:
          BASE_URL: https://caption-cloud-magic.lovable.app
          CI: 'true'
          # Cockpit-Reporter pusht Resultate in smoke_test_runs (no-op ohne diese Vars).
          E2E_INGEST_URL: https://lbunafpxuskwmsrraqxl.functions.supabase.co/ingest-e2e-results
          E2E_INGEST_TOKEN: ${{ secrets.E2E_INGEST_TOKEN }}
        run: npx playwright test tests/critical-journeys.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
