name: E2E Smoke Suite

# Breite Smoke-Suite gegen die Published URL.
# 8 Spec-Files, ~25 Tests, ~3-4 Min Laufzeit.
# Kein Login, keine Secrets nötig — fängt 80% aller "ist die App online?"-Regressionen.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Alle 6 Stunden gegen Production
    - cron: '0 */6 * * *'

jobs:
  smoke-suite:
    name: E2E Smoke Suite
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        env:
          BASE_URL: https://caption-cloud-magic.lovable.app
          CI: 'true'
          E2E_INGEST_URL: https://lbunafpxuskwmsrraqxl.functions.supabase.co/ingest-e2e-results
          E2E_INGEST_TOKEN: ${{ secrets.E2E_INGEST_TOKEN }}
        run: |
          npx playwright test \
            tests/critical-journeys.spec.ts \
            tests/public-pages.spec.ts \
            tests/seo-meta.spec.ts \
            tests/auth-flows.spec.ts \
            tests/api-health.spec.ts \
            tests/performance-budgets.spec.ts \
            tests/mobile-responsive.spec.ts \
            tests/not-found.spec.ts \
            --workers=2

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
